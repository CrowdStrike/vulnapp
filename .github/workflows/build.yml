name: Docker Build Test

on:
  push:
    branches:
      - main
    paths-ignore:
      - '**.md'
  pull_request:
    branches:
      - main
    paths-ignore:
      - '**.md'

permissions:
  contents: read

jobs:
  docker-build-test:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout code
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@e468171a9de216ec08956ac3ada2f0791b6bd435 # v3.11.1

      - name: Build multi-platform Docker image
        uses: docker/build-push-action@263435318d21b8e681c14492fe198d362a7d2c83 # v6.18.0
        with:
          context: .
          platforms: linux/amd64,linux/arm64,linux/s390x,linux/ppc64le
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: |
            vulnapp:test
            vulnapp:pr-${{ github.event.pull_request.number }}

      - name: Test Docker image (amd64)
        run: |
          docker buildx build \
            --platform linux/amd64 \
            --load \
            --tag vulnapp:test-local \
            .

          docker run -d --name vulnapp-test -p 8080:8080 vulnapp:test-local

          echo "Waiting for server to start..."
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8080/ > /dev/null 2>&1; then
              echo "Server is up"
              break
            fi
            if [ "$i" -eq 30 ]; then
              echo "Server failed to start within 30s"
              docker logs vulnapp-test
              docker rm -f vulnapp-test
              exit 1
            fi
            sleep 1
          done

          echo "Verifying welcome page content..."
          curl -sf http://localhost:8080/ | grep -q "Welcome to vulnerable.example.com"
          echo "Smoke test passed!"

          docker rm -f vulnapp-test
